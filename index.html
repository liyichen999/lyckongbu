<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圣玛丽医院 · 3D恐怖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="introScreen">
    <div class="intro-text">
      <h1>圣玛丽医院</h1>
      <p>暴风雨之夜，你因车祸醒来，发现自己在废弃的医院中。</p>
      <p>广播断断续续传来声音：</p>
      <p class="quote">"恢复电力...需要找到4个保险丝...小心阴影..."</p>
    </div>
    <button id="continueButton">开始求生</button>
  </div>

  <div id="hud" style="display:none">
    <div class="hud-item" id="objective">🎯 收集4个保险丝，恢复电力</div>
    <div class="hud-item" id="fuseHud">⚡ 保险丝 0/4</div>
    <div class="hud-item" id="healthHud">❤️ 血量 100</div>
    <div class="hud-item" id="batteryHud">🔋 手电筒 100%</div>
    <div class="hud-item" id="medkitHud">💊 医疗包 0</div>
  </div>

  <div id="message"></div>
  <div id="vignette"></div>
  <div id="noise"></div>
  <div id="bloodOverlay"></div>
  <div id="rainOverlay"></div>

  <div id="deathScreen" style="display:none">
    <h2>你死了</h2>
    <p>黑暗吞噬了你...</p>
    <button id="restartButton">重新开始</button>
  </div>

  <div id="winScreen" style="display:none">
    <h2>电力恢复</h2>
    <p>你逃出了医院，但风暴仍在继续...</p>
    <button id="restartButtonWin">再玩一次</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
